<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Optimizador de Corte PRO</title>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:20px}
.container{display:grid;grid-template-columns:1fr 350px;gap:20px}

.card{background:white;padding:15px;border-radius:8px}

.canvas{
  width:240px;
  height:480px;
  border:2px solid black;
  position:relative;
  margin-bottom:10px;
}

.pieza{
  position:absolute;
  border:1px solid red;
  background:rgba(255,0,0,0.3);
  font-size:10px;
  overflow:hidden;
}

input,button{padding:8px;margin:5px}
</style>
</head>

<body>

<h2>📐 Optimizador de Corte PRO</h2>

<div class="container">

<div class="card">

<input id="alto" placeholder="Alto cm">
<input id="ancho" placeholder="Ancho cm">
<button onclick="agregar()">Agregar</button>

<h3>Total: $<span id="total">0</span></h3>
<h4>Hojas usadas: <span id="hojas">1</span></h4>
<h4>Uso: <span id="uso">0%</span></h4>

</div>

<div class="card" id="lienzos"></div>

</div>

<script>

let hojas = [
  { espacios:[], areaUsada:0 }
];

let total=0;

function crearCanvas(){
  let div=document.createElement('div');
  div.className="canvas";
  document.getElementById('lienzos').appendChild(div);
  return div;
}

crearCanvas();

function cabe(x,y,w,h,espacios){
  return !espacios.some(p=>
    x < p.x + p.w &&
    x + w > p.x &&
    y < p.y + p.h &&
    y + h > p.y
  );
}

function buscarPos(w,h,espacios){
  for(let y=0;y<=480-h;y+=5){
    for(let x=0;x<=240-w;x+=5){
      if(cabe(x,y,w,h,espacios)){
        return {x,y};
      }
    }
  }
  return null;
}

function colocarEnHoja(w,h,hoja){

  let posNormal = buscarPos(w,h,hoja.espacios);
  let posRotado = buscarPos(h,w,hoja.espacios);

  if(posNormal && posRotado){
    // elegir mejor (más pegado arriba)
    return posNormal.y <= posRotado.y 
      ? {...posNormal,w,h}
      : {...posRotado,w:h,h:w};
  }

  if(posNormal) return {...posNormal,w,h};
  if(posRotado) return {...posRotado,w:h,h:w};

  return null;
}

function calcularPrecio(a,h){
  if(a<=60 && h<=60){
    let m=Math.max(a,h);
    return m*10;
  }

  if(a>=160){
    if(a>=220) return 750;
    if(a>=180) return 700;
    if(a>=170) return 550;
  }

  return (a*h)/100;
}

function agregar(){

  let a=parseFloat(document.getElementById('alto').value);
  let h=parseFloat(document.getElementById('ancho').value);
  if(!a||!h)return;

  let precio=calcularPrecio(a,h);
  total+=precio;

  let w=a*2;
  let ht=h*2;

  let colocado=false;

  for(let i=0;i<hojas.length;i++){
    let hoja=hojas[i];

    let pos=colocarEnHoja(w,ht,hoja);

    if(pos){
      dibujar(i,pos,a,h);
      hoja.espacios.push(pos);
      hoja.areaUsada+= (pos.w*pos.h);
      colocado=true;
      break;
    }
  }

  if(!colocado){
    hojas.push({espacios:[],areaUsada:0});
    crearCanvas();
    agregar();
    return;
  }

  actualizarUI();
}

function dibujar(index,pos,a,h){

  let canvas=document.getElementsByClassName('canvas')[index];

  let div=document.createElement('div');
  div.className="pieza";

  div.style.left=pos.x+"px";
  div.style.top=pos.y+"px";
  div.style.width=pos.w+"px";
  div.style.height=pos.h+"px";

  div.innerText=a+"x"+h;

  canvas.appendChild(div);
}

function actualizarUI(){

  document.getElementById('total').innerText=total.toFixed(2);
  document.getElementById('hojas').innerText=hojas.length;

  let areaTotal=hojas.length*240*480;
  let usada=hojas.reduce((acc,h)=>acc+h.areaUsada,0);

  let uso=(usada/areaTotal)*100;

  document.getElementById('uso').innerText=uso.toFixed(1)+"%";
}

</script>

</body>
</html>
