<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cotizador ICONO | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        :root { --brand-yellow: #facc15; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background-color: #050505; color: #f3f4f6; }
        .glass { background: rgba(18, 18, 18, 0.9); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.05); }
        input, select, textarea { background: #121212 !important; border: 1px solid #262626 !important; color: white !important; transition: all 0.2s; }
        input:focus { border-color: var(--brand-yellow) !important; outline: none; }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-5xl mx-auto">
        <header id="header-branding" class="flex flex-col md:flex-row justify-between items-center mb-6 p-6 glass rounded-3xl border-b-2 border-yellow-400">
            <div class="flex items-center gap-5">
                <img src="image_100920.png" alt="Logo ICONO" class="h-20 w-auto object-contain">
                <div>
                    <h1 class="text-3xl font-black tracking-tight leading-none">ICONO<span class="text-yellow-400">GRÁFICOS</span></h1>
                    <p class="text-gray-400 text-[10px] uppercase tracking-[0.2em] mt-1">Monterrey, NL • Soluciones Visuales</p>
                </div>
            </div>
            <div class="text-right mt-4 md:mt-0">
                <p class="text-[10px] text-gray-500 uppercase font-bold tracking-widest">Folio de Control</p>
                <p class="text-xl font-mono font-bold text-white" id="folio-display"></p>
                <p class="text-[10px] text-gray-400 mt-1" id="current-date"></p>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-4">
                <div class="glass p-5 rounded-2xl shadow-xl">
                    <label class="text-[10px] font-bold uppercase text-yellow-400 block mb-2">Datos de Venta</label>
                    <input type="text" id="client-input" placeholder="Nombre del Cliente" class="w-full text-sm p-3 rounded-xl mb-4" oninput="updateClient()">
                    
                    <div class="flex items-center gap-3 p-3 bg-white/5 rounded-xl">
                        <input type="checkbox" id="iva" class="w-5 h-5 accent-yellow-400 cursor-pointer" onchange="calculate()">
                        <label class="text-xs text-gray-300 cursor-pointer">Desglosar IVA (16%)</label>
                    </div>
                </div>

                <div class="glass p-5 rounded-2xl">
                    <label class="text-[10px] font-bold uppercase text-gray-500 block mb-2">Notas Adicionales</label>
                    <textarea id="notes-input" class="w-full text-xs p-3 rounded-xl h-24 resize-none" placeholder="Ej: No incluye instalación. Tiempo de entrega: 3 días hábiles." oninput="updateNotes()"></textarea>
                </div>
            </div>

            <div class="lg:col-span-3 space-y-4">
                <div id="print-area" class="glass p-8 rounded-3xl shadow-2xl relative overflow-hidden">
                    <div class="absolute top-0 right-0 p-4 opacity-10 pointer-events-none">
                        <i data-lucide="layers" class="w-32 h-32 text-white"></i>
                    </div>

                    <div class="mb-8">
                        <p class="text-xs text-gray-500 font-medium">Cotización preparada para:</p>
                        <h2 class="text-2xl font-bold text-white" id="client-name">Público General</h2>
                    </div>
                    
                    <table class="w-full text-left">
                        <thead>
                            <tr class="text-gray-500 text-[10px] uppercase border-b border-white/10 tracking-wider">
                                <th class="pb-4">Material / Servicio</th>
                                <th class="pb-4 text-center">Precio m²</th>
                                <th class="pb-4 text-center">Medidas (cm)</th>
                                <th class="pb-4 text-center">Área</th>
                                <th class="pb-4 text-right">Subtotal</th>
                                <th class="pb-4"></th>
                            </tr>
                        </thead>
                        <tbody id="cart-body"></tbody>
                    </table>

                    <button onclick="addRow()" class="mt-8 text-yellow-400 font-bold text-xs flex items-center gap-2 hover:text-white transition-colors">
                        <i data-lucide="plus-circle" class="w-4 h-4"></i> AGREGAR CONCEPTO
                    </button>

                    <div class="mt-8 p-4 bg-white/5 rounded-xl border border-white/5 hidden" id="notes-container">
                        <p class="text-[10px] uppercase text-gray-500 font-bold mb-1">Observaciones:</p>
                        <p id="notes-display" class="text-xs text-gray-300 whitespace-pre-wrap"></p>
                    </div>

                    <div class="mt-10 pt-6 border-t border-white/10 flex flex-col items-end">
                        <div class="w-full max-w-[280px] space-y-2">
                            <div class="flex justify-between text-xs text-gray-400" id="subtotal-base-div">
                                <span>Subtotal:</span>
                                <span id="res-subtotal">$0.00</span>
                            </div>
                            <div class="flex justify-between text-xs text-gray-400 hidden" id="iva-div">
                                <span>IVA (16%):</span>
                                <span id="res-iva">$0.00</span>
                            </div>
                            <div class="flex justify-between text-3xl font-black text-yellow-400 pt-2 border-t border-white/10">
                                <span>TOTAL</span>
                                <span id="res-total">$0.00</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="flex gap-4">
                    <button onclick="window.print()" class="flex-1 bg-white text-black font-black py-4 rounded-2xl hover:bg-gray-200 transition-all flex items-center justify-center gap-2 text-sm">
                        <i data-lucide="printer" class="w-4 h-4"></i> IMPRIMIR / PDF
                    </button>
                    <button onclick="whatsapp()" class="flex-1 bg-green-600 text-white font-black py-4 rounded-2xl hover:bg-green-700 transition-all flex items-center justify-center gap-2 text-sm">
                        <i data-lucide="message-circle" class="w-4 h-4"></i> ENVIAR A CLIENTE
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const materials = ["Coroplast 4mm", "Trovicel 3mm", "Lona Front 13oz", "Vinil Impreso HD", "Corte de Vinil", "Tabloide", "Instalación"];

        function updateClient() {
            document.getElementById('client-name').innerText = document.getElementById('client-input').value || "Público General";
        }

        function updateNotes() {
            const val = document.getElementById('notes-input').value;
            const container = document.getElementById('notes-container');
            document.getElementById('notes-display').innerText = val;
            container.classList.toggle('hidden', val.length === 0);
        }

        function addRow() {
            const body = document.getElementById('cart-body');
            const row = document.createElement('tr');
            row.className = "border-b border-white/5 group transition-colors hover:bg-white/[0.02]";
            row.innerHTML = `
                <td class="py-4">
                    <select class="w-full bg-transparent text-sm border-none focus:ring-0 p-1 rounded">
                        ${materials.map(m => `<option value="${m}">${m}</option>`).join('')}
                    </select>
                </td>
                <td class="text-center"><input type="number" class="w-24 text-center val-price p-1 rounded" value="280" oninput="calculate()"></td>
                <td class="py-4 flex items-center justify-center gap-2">
                    <input type="number" class="w-16 text-center val-w p-1 rounded" placeholder="Ancho" oninput="calculate()">
                    <span class="text-gray-600 text-xs">×</span>
                    <input type="number" class="w-16 text-center val-h p-1 rounded" placeholder="Alto" oninput="calculate()">
                </td>
                <td class="text-center text-[10px] text-gray-500 font-mono val-area">0.00 m²</td>
                <td class="text-right font-bold text-white val-sub">$0.00</td>
                <td class="text-right pl-4">
                    <button onclick="this.parentElement.parentElement.remove(); calculate();" class="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity p-1">
                        <i data-lucide="trash-2" class="w-4 h-4"></i>
                    </button>
                </td>
            `;
            body.appendChild(row);
            lucide.createIcons();
        }

        function calculate() {
            let baseTotal = 0;
            document.querySelectorAll('#cart-body tr').forEach(row => {
                const p = parseFloat(row.querySelector('.val-price').value) || 0;
                const w = parseFloat(row.querySelector('.val-w').value) || 0;
                const h = parseFloat(row.querySelector('.val-h').value) || 0;
                
                const areaM2 = (w * h) / 10000;
                const sub = p * areaM2;
                
                row.querySelector('.val-area').innerText = areaM2.toFixed(3) + " m²";
                row.querySelector('.val-sub').innerText = `$${sub.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
                baseTotal += sub;
            });

            const ivaEnabled = document.getElementById('iva').checked;
            const ivaVal = baseTotal * 0.16;
            const finalTotal = ivaEnabled ? baseTotal + ivaVal : baseTotal;

            document.getElementById('res-subtotal').innerText = `$${baseTotal.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            document.getElementById('res-iva').innerText = `$${ivaVal.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            document.getElementById('res-total').innerText = `$${finalTotal.toLocaleString('es-MX', {minimumFractionDigits: 2})}`;
            
            document.getElementById('iva-div').classList.toggle('hidden', !ivaEnabled);
        }

        // Inicialización
        const d = new Date();
        const folio = `IG-${d.getFullYear()}${String(d.getMonth() + 1).padStart(2, '0')}${String(d.getDate()).padStart(2, '0')}-${Math.floor(100 + Math.random() * 900)}`;
        document.getElementById('folio-display').innerText = folio;
        document.getElementById('current-date').innerText = d.toLocaleDateString('es-MX', { day:'numeric', month:'long', year:'numeric' });
        
        window.onload = addRow;
        lucide.createIcons();

        function whatsapp() {
            const client = document.getElementById('client-name').innerText;
            const total = document.getElementById('res-total').innerText;
            const folio = document.getElementById('folio-display').innerText;
            const text = `*COTIZACIÓN ICONOGRÁFICOS*\n\n📌 *Folio:* ${folio}\n👤 *Cliente:* ${client}\n💰 *Total:* ${total}\n\n_Favor de confirmar para proceder con su pedido._`;
            window.open(`https://wa.me/528111372860?text=${encodeURIComponent(text)}`);
        }
    </script>
</body>
</html>
