```html
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cotizador ICONO PRO</title>

<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --negro:#0a0a0a;
  --amarillo:#FFE000;
  --gris:#f4f4f4;
}

body{font-family:'Barlow',sans-serif;background:var(--gris);margin:0}

/* HEADER */
.header{
  background:var(--negro);
  color:white;
  display:flex;
  justify-content:space-between;
  padding:20px;
  border-bottom:4px solid var(--amarillo)
}

.header img{height:60px}

/* LAYOUT */
.container{max-width:1100px;margin:auto;padding:20px}

.card{
  background:white;
  margin-bottom:15px;
  padding:15px;
  border-radius:8px;
  box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* INPUTS */
input, select, textarea{
  padding:8px;
  border-radius:4px;
  border:1px solid #ccc;
  width:100%;
}

/* TABLA */
table{width:100%;border-collapse:collapse}

th{background:#111;color:#FFE000}

th,td{
  padding:8px;
  border-bottom:1px solid #ddd;
  text-align:center
}

/* BOTONES */
button{
  padding:10px 15px;
  border:none;
  background:var(--negro);
  color:var(--amarillo);
  cursor:pointer;
  border-radius:6px;
  font-weight:bold;
}

/* SWITCH IVA */
.switch{
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
}

.switch-box{
  width:50px;
  height:25px;
  background:#ccc;
  border-radius:20px;
  position:relative;
  transition:.3s;
}

.switch-box::after{
  content:'';
  width:20px;
  height:20px;
  background:white;
  position:absolute;
  top:2.5px;
  left:3px;
  border-radius:50%;
  transition:.3s;
}

.switch.active .switch-box{background:#22c55e}
.switch.active .switch-box::after{left:25px}

/* TOTAL */
.total{text-align:right}
.total strong{font-size:26px}

/* PRINT */
@media print{
  button,.no-print{display:none}
  body{background:white}
  .card{box-shadow:none}

  /* ocultar $/m² y botones */
  th:nth-child(2), td:nth-child(2),
  th:last-child, td:last-child{
    display:none;
  }
}
</style>
</head>

<body>

<div class="header">
  <div style="display:flex;gap:10px;align-items:center;">
    <img src="logo.png">
    <h1 style="color:#FFE000;">ICONO</h1>
  </div>

  <div>
    <div id="fecha"></div>
    <div id="folio"></div>
  </div>
</div>

<div class="container">

<!-- CONTACTO -->
<div class="card">
  <strong>ICONOGRAFICOS</strong><br>
  📍 Av. Ruiz Cortines 2214, Monterrey, N.L.<br>
  📞 81 0000 0000<br>
  📧 ventas@iconograficos.com.mx<br>
  🌐 www.iconograficos.com.mx
</div>

<!-- CLIENTE -->
<div class="card">
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
    <input placeholder="Cliente" id="cliente">
    <input placeholder="Proyecto" id="proyecto">
    <input placeholder="Asesor" id="asesor">
    <input placeholder="Teléfono" id="telefono">
  </div>
</div>

<!-- BOTONES -->
<div class="card no-print">
  <button onclick="toggleModo()" id="modoBtn">Modo: INTERNO</button>
</div>

<!-- TABLA -->
<div class="card">
<table>
<thead>
<tr>
<th>Material</th><th>$/m²</th><th>Cant</th><th>Ancho</th><th>Alto</th><th>Unidad</th><th>Área</th><th>Subtotal</th><th></th>
</tr>
</thead>
<tbody id="tbody"></tbody>
</table>

<br>
<button onclick="addRow()" class="no-print">+ Agregar</button>
</div>

<!-- TOTAL -->
<div class="card total">

<div class="switch active no-print" id="ivaSwitch" onclick="toggleIVA()">
  <div class="switch-box"></div>
  <span id="ivaText">IVA ACTIVADO (16%)</span>
</div>

<br>

Subtotal: $<span id="sub">0.00</span><br>
IVA: $<span id="iva">0.00</span><br>
<strong>TOTAL: $<span id="total">0.00</span></strong>

</div>

<!-- NOTAS -->
<div class="card">
  <textarea placeholder="Notas o condiciones..."></textarea>
</div>

<button onclick="guardarPDF()" class="no-print">Exportar PDF</button>

</div>

<script>
const precios={
  vinil:120,lona:90,trovicel:180,coroplast:100,
  sticker:150,tabloide:80,micro:200,recorte:220
};

let ivaActivo=true;
let modoCliente=false;

/* IVA */
function toggleIVA(){
  ivaActivo=!ivaActivo;
  document.getElementById('ivaSwitch').classList.toggle('active');
  document.getElementById('ivaText').innerText=
    ivaActivo ? "IVA ACTIVADO (16%)" : "IVA DESACTIVADO";
  calc();
}

/* MODO CLIENTE */
function toggleModo(){
  modoCliente=!modoCliente;

  const btn=document.getElementById('modoBtn');
  btn.innerText = modoCliente ? "Modo: CLIENTE" : "Modo: INTERNO";

  document.querySelectorAll('th:nth-child(2), td:nth-child(2)')
    .forEach(el=>el.style.display = modoCliente ? 'none':'');
}

/* FOLIO REAL */
function generarFolio(){
  let folio = localStorage.getItem('folioICONO');

  if(!folio){
    folio = 1;
  }else{
    folio = parseInt(folio) + 1;
  }

  localStorage.setItem('folioICONO',folio);

  return "COT-" + String(folio).padStart(4,'0');
}

/* FILAS */
function addRow(){
  const id=Date.now();

  const tr=document.createElement('tr');

  tr.innerHTML=`
<td>
<select onchange="setPrecio(${id},this.value)">
<option value="vinil">Vinil</option>
<option value="lona">Lona</option>
<option value="trovicel">Trovicel</option>
<option value="coroplast">Coroplast</option>
<option value="sticker">Sticker</option>
<option value="tabloide">Tabloide</option>
<option value="micro">Microperforado</option>
<option value="recorte">Vinil Recorte</option>
</select>
</td>

<td><input id="p-${id}" type="number"></td>
<td><input id="c-${id}" type="number" value="1"></td>
<td><input id="a-${id}" type="number"></td>
<td><input id="h-${id}" type="number"></td>

<td>
<select id="u-${id}">
<option value="cm">cm</option>
<option value="m">m</option>
</select>
</td>

<td id="area-${id}">0</td>
<td id="sub-${id}">0</td>

<td><button onclick="this.parentElement.parentElement.remove();calc()">X</button></td>
`;

  document.getElementById('tbody').appendChild(tr);
  setPrecio(id,'vinil');
}

function setPrecio(id,mat){
  document.getElementById('p-'+id).value=precios[mat]||0;
  calc();
}

/* FORMATO */
function money(n){
  return n.toLocaleString('es-MX',{minimumFractionDigits:2});
}

/* CALCULO */
function calc(){
  let total=0;

  document.querySelectorAll('#tbody tr').forEach(tr=>{
    const id=tr.querySelector('input').id.split('-')[1];

    let p=+document.getElementById('p-'+id).value||0;
    let c=+document.getElementById('c-'+id).value||1;
    let a=+document.getElementById('a-'+id).value||0;
    let h=+document.getElementById('h-'+id).value||0;
    let u=document.getElementById('u-'+id).value;

    if(u==='cm'){a/=100;h/=100}

    let area=a*h;
    let sub=area*p*c;

    document.getElementById('area-'+id).innerText=area.toFixed(3);
    document.getElementById('sub-'+id).innerText=money(sub);

    total+=sub;
  });

  let iva=ivaActivo ? total*0.16 : 0;

  document.getElementById('sub').innerText=money(total);
  document.getElementById('iva').innerText=money(iva);
  document.getElementById('total').innerText=money(total+iva);
}

/* INIT */
document.getElementById('fecha').innerText=new Date().toLocaleString('es-MX');
document.getElementById('folio').innerText="Folio: "+generarFolio();

function guardarPDF(){window.print();}

addRow();
</script>

</body>
</html>
```
